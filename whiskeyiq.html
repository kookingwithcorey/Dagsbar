<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DAGS | Whiskey IQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #050608;
      --bg-alt: #11141a;
      --accent: #0f8b6b;
      --accent-soft: rgba(15, 139, 107, 0.24);
      --text: #f7f7f7;
      --muted: #a3acb9;
      --border: rgba(255, 255, 255, 0.12);

      --cream: #efe5dc;
      --cream-2: #f7f1ea;
      --card: #ffffff;
      --navy: #0f8b6b;          /* light mode left rail = DAGS green */
      --navy-2: #0b6f58;
      --gold: #c18d5c;
      --gold-soft: rgba(193, 141, 92, 0.16);
      --line: #ddd1c4;
      --text-dark: #18120d;
      --muted-dark: #8b7d72;
      --black-btn: #160d08;
      --danger: #d49a9a;
      --blue: #4a95de;
    }

    body.dark-ui {
      --cream: #0f1117;
      --cream-2: #141924;
      --card: #171d28;
      --navy: #050608;
      --navy-2: #0a0d13;
      --gold: #d2a36d;
      --gold-soft: rgba(210, 163, 109, 0.16);
      --line: #3a4458;
      --text-dark: #f3f4f7;
      --muted-dark: #a9b0bf;
      --black-btn: #ffffff;
      --danger: #e2a3a3;
      --blue: #6fb2f2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #202735 0, #050608 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      line-height: 1.45;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button, input, textarea {
      font: inherit;
    }

    .page {
      width: 100%;
      max-width: 1220px;
      padding: 24px 16px 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.28em;
    }

    .brand-link {
      display: inline-block;
      color: var(--text);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    nav a {
      font-size: 0.85rem;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: all 0.18s ease;
    }

    nav a:hover {
      border-color: var(--border);
      color: var(--text);
      background: rgba(255,255,255,0.02);
    }

    nav a.active {
      border-color: var(--accent-soft);
      background: rgba(15,139,107,0.12);
      color: var(--text);
    }

    .app-shell {
      background: rgba(10,12,18,0.92);
      border-radius: 24px;
      border: 1px solid var(--border);
      padding: 12px;
      box-shadow: 0 18px 80px rgba(0,0,0,0.55);
      overflow: hidden;
    }

    .app-frame {
      background: var(--cream);
      border-radius: 22px;
      overflow: hidden;
      min-height: 920px;
      color: var(--text-dark);
      position: relative;
    }

    .screen {
      display: none;
      min-height: 920px;
    }

    .screen.active {
      display: block;
    }

    .home-screen {
      padding: 20px 18px 90px;
      position: relative;
      background: var(--cream);
      color: var(--text-dark);
    }

    .home-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      gap: 12px;
    }

    .home-brand {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 4vw, 2.7rem);
      line-height: 1;
    }

    .home-brand .small {
      font-style: italic;
      font-weight: 400;
      margin-right: 6px;
    }

    .search-wrap {
      display: grid;
      grid-template-columns: 1fr 58px;
      gap: 10px;
      margin-bottom: 18px;
    }

    .search-box {
      position: relative;
      background: var(--card);
      border-radius: 999px;
      border: 1px solid rgba(24,18,13,0.08);
      min-height: 58px;
      display: flex;
      align-items: center;
      padding: 0 18px 0 48px;
    }

    .search-box::before {
      content: "⌕";
      position: absolute;
      left: 18px;
      color: var(--muted-dark);
      font-size: 1.15rem;
    }

    .search-input {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text-dark);
      outline: none;
      font-size: 1rem;
    }

    .search-go {
      border: none;
      border-radius: 999px;
      background: #120d09;
      color: #fff;
      font-size: 1.35rem;
      cursor: pointer;
    }

    body.dark-ui .search-box,
    body.dark-ui .sort-btn,
    body.dark-ui .iq-choice-btn,
    body.dark-ui .iq-share-btn,
    body.dark-ui .iq-status-pill,
    body.dark-ui .iq-edit-btn,
    body.dark-ui .iq-summary-box,
    body.dark-ui .iq-summary-card,
    body.dark-ui .bottle-card,
    body.dark-ui .iq-tag,
    body.dark-ui .modal-input,
    body.dark-ui .modal-secondary {
      background: #171d28;
      color: var(--text-dark);
      border-color: rgba(255,255,255,0.08);
    }

    body.dark-ui .search-box::before,
    body.dark-ui .collection-title,
    body.dark-ui .collection-count,
    body.dark-ui .bottle-meta-top,
    body.dark-ui .iq-stage-kicker,
    body.dark-ui .iq-summary-box-label,
    body.dark-ui .iq-summary-title,
    body.dark-ui .iq-flavor-label,
    body.dark-ui .iq-notes-label,
    body.dark-ui .modal-label {
      color: var(--gold);
    }

    body.dark-ui .search-input,
    body.dark-ui .modal-input,
    body.dark-ui .iq-manual input,
    body.dark-ui .iq-notes-textarea {
      color: #f3f4f7;
      -webkit-text-fill-color: #f3f4f7;
      caret-color: #f3f4f7;
    }

    body.dark-ui .iq-notes-textarea,
    body.dark-ui .iq-theme-btn,
    body.dark-ui .iq-pm-btn {
      background: #171d28;
      color: #f3f4f7;
      border-color: rgba(255,255,255,0.08);
    }

   body.dark-ui .iq-tag.active,
body.dark-ui .iq-tag:hover {
  background: #0f8b6b;
  color: #ffffff;
  border-color: #0f8b6b;
}

    .collection-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .collection-title {
      font-size: 0.9rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted-dark);
      font-weight: 700;
    }

    .collection-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .collection-count {
      color: var(--muted-dark);
      font-size: 0.92rem;
    }

    .sort-btn {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(24,18,13,0.08);
      background: rgba(255,255,255,0.75);
      color: var(--muted-dark);
      font-weight: 700;
      cursor: pointer;
    }

    .bottle-list {
      display: grid;
      gap: 12px;
    }

    .empty-state {
      background: var(--card);
      border: 1px solid rgba(24,18,13,0.08);
      border-radius: 18px;
      padding: 28px 20px;
      color: var(--muted-dark);
      text-align: center;
      font-size: 1rem;
    }

    .bottle-card {
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr) 96px;
      gap: 14px;
      align-items: center;
      background: var(--card);
      border-radius: 18px;
      padding: 12px;
      border: 1px solid rgba(24,18,13,0.08);
      box-shadow: 0 3px 10px rgba(0,0,0,0.04);
      cursor: pointer;
    }

    .bottle-thumb {
      width: 62px;
      height: 62px;
      border-radius: 12px;
      background: linear-gradient(135deg, #f0e2d2, #fff);
      border: 1px solid rgba(24,18,13,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      overflow: hidden;
    }

    .bottle-meta-top {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .bottle-name {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.1rem, 2vw, 1.8rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--text-dark);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .bottle-score {
      text-align: right;
    }

    .bottle-score-top {
      font-size: 2.2rem;
      line-height: 1;
      font-weight: 800;
      color: var(--text-dark);
    }

    .bottle-score-top small {
      display: block;
      font-size: 0.34em;
      color: var(--muted-dark);
      font-weight: 600;
      margin-top: 4px;
    }

    .bottle-score-line {
      height: 5px;
      background: rgba(24,18,13,0.08);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .bottle-score-line span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), #e7d3be);
    }

    .fab-add {
      position: absolute;
      right: 18px;
      bottom: 18px;
      width: 64px;
      height: 64px;
      border-radius: 999px;
      border: none;
      background: #120d09;
      color: #fff;
      font-size: 2.2rem;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 18px 34px rgba(0,0,0,0.2);
    }

    .iq-rating-shell {
      display: grid;
      grid-template-columns: 205px minmax(0, 1fr);
      min-height: 920px;
    }

    .iq-left {
      background: linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .iq-side-item {
      padding: 20px 16px;
      min-height: 118px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: relative;
      cursor: pointer;
      transition: background 0.12s linear;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .iq-side-item:hover {
      background: rgba(255,255,255,0.05);
    }

    .iq-side-item.active {
      background: rgba(255,255,255,0.13);
      box-shadow: inset 4px 0 0 #ffffff;
    }

    .iq-side-label {
      font-size: 0.88rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
      color: rgba(255,255,255,0.86);
      margin-bottom: 12px;
      line-height: 1.1;
    }

    .iq-side-score {
      font-size: 2.4rem;
      line-height: 1;
      font-weight: 800;
    }

    .iq-side-score small {
      display: block;
      font-size: 0.34em;
      color: rgba(255,255,255,0.58);
      font-weight: 600;
      margin-top: 4px;
    }

    .iq-side-empty {
      font-size: 2rem;
      line-height: 1;
      color: rgba(255,255,255,0.34);
      font-weight: 700;
      margin-top: 6px;
    }

    .iq-total {
      margin-top: auto;
      padding: 24px 18px;
      background: rgba(0,0,0,0.12);
      cursor: pointer;
    }

    .iq-total.active {
      background: rgba(255,255,255,0.13);
      box-shadow: inset 4px 0 0 #ffffff;
    }

    .iq-total-label {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
      margin-bottom: 14px;
      color: rgba(255,255,255,0.82);
    }

    .iq-total-score {
      font-size: 3rem;
      line-height: 1;
      font-weight: 800;
      color: #fff;
    }

    .iq-total-score small {
      font-size: 0.34em;
      color: rgba(255,255,255,0.7);
      margin-left: 4px;
      font-weight: 600;
    }

    .iq-right {
      background: var(--cream);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      min-height: 100%;
      position: relative;
    }

    .iq-theme-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 30;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(24,18,13,0.08);
      background: rgba(255,255,255,0.7);
      color: var(--text-dark);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    }

    .iq-theme-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .iq-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 60px 16px 22px;
      border-bottom: 1px solid rgba(24,18,13,0.08);
      background: rgba(255,255,255,0.16);
    }

    .iq-back {
      border: none;
      background: transparent;
      color: var(--text-dark);
      font-size: 1.8rem;
      line-height: 1;
      cursor: pointer;
      padding: 4px;
    }

    .iq-bottle-name {
      font-size: clamp(1.1rem, 2.2vw, 1.7rem);
      font-weight: 700;
      text-align: center;
      flex: 1;
      font-family: Georgia, "Times New Roman", serif;
    }

    .iq-top-spacer {
      width: 28px;
      flex-shrink: 0;
    }

    .iq-stage {
      display: none;
      padding: 24px 28px 24px;
      flex: 1;
    }

    .iq-stage.active {
      display: block;
    }

    .iq-stage-head {
      text-align: center;
      margin-bottom: 10px;
    }

    .iq-stage-kicker {
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .iq-stage-title {
      font-size: clamp(2.3rem, 5vw, 3.5rem);
      line-height: 1;
      font-weight: 700;
      font-family: Georgia, "Times New Roman", serif;
      margin-bottom: 6px;
      color: var(--text-dark);
    }

    .iq-stage-subtitle {
      font-size: 1.15rem;
      color: var(--muted-dark);
    }

    .iq-emoji {
      text-align: center;
      font-size: 4rem;
      line-height: 1;
      min-height: 76px;
      margin: 14px 0 8px;
    }

    .iq-current-score-label {
      text-align: center;
      font-size: 1rem;
      color: var(--muted-dark);
      margin-bottom: 8px;
      min-height: 30px;
    }

    .iq-slider-wrap {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) 88px;
      align-items: center;
      gap: 12px;
      margin: 10px auto 8px;
      max-width: 620px;
      min-height: 470px;
    }

    .iq-pm-btn {
      width: 70px;
      height: 70px;
      border-radius: 999px;
      border: 1px solid rgba(24,18,13,0.08);
      background: rgba(255,255,255,0.78);
      color: var(--blue);
      font-size: 2.8rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      cursor: pointer;
      transition: transform 0.03s linear;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      user-select: none;
    }

    .iq-pm-btn:active {
      transform: scale(0.97);
    }

    .iq-track-shell {
      position: relative;
      height: 460px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .iq-line {
      position: absolute;
      top: 18px;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      background: var(--line);
      border-radius: 999px;
    }

    .iq-line::before,
    .iq-line::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 4px;
      background: var(--text-dark);
      border-radius: 999px;
    }

    .iq-line::before { top: 0; }
    .iq-line::after { bottom: 0; }

    .iq-fill {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 4px;
      background: linear-gradient(180deg, var(--gold), #8c6f52);
      border-radius: 999px;
      opacity: 0.42;
      transition: none;
    }

    .iq-range {
      -webkit-appearance: none;
      appearance: none;
      width: 460px;
      height: 56px;
      transform: rotate(-90deg);
      background: transparent;
      position: relative;
      z-index: 3;
      cursor: pointer;
      margin: 0;
    }

    .iq-range::-webkit-slider-runnable-track {
      height: 4px;
      background: transparent;
    }

    .iq-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1c140f;
      border: 5px solid rgba(255,255,255,0.88);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
      margin-top: -18px;
    }

    .iq-range::-moz-range-track {
      height: 4px;
      background: transparent;
    }

    .iq-range::-moz-range-thumb {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1c140f;
      border: 5px solid rgba(255,255,255,0.88);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }

    .iq-manual {
      max-width: 200px;
      margin: 0 auto 10px;
      text-align: center;
    }

    .iq-manual input {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text-dark);
      font-size: clamp(2.7rem, 7vw, 4.4rem);
      line-height: 1;
      font-weight: 800;
      text-align: center;
      outline: none;
    }

    .iq-manual small {
      display: block;
      font-size: 0.78rem;
      color: var(--muted-dark);
      margin-top: 4px;
    }

    .iq-choice-wrap {
      max-width: 520px;
      margin: 20px auto 10px;
      display: grid;
      gap: 12px;
    }

    .iq-choice-btn {
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(24,18,13,0.08);
      background: rgba(255,255,255,0.55);
      color: var(--text-dark);
      padding: 16px 18px;
      text-align: left;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .iq-choice-btn span {
      color: var(--muted-dark);
      font-weight: 500;
      margin-left: 8px;
    }

    .iq-choice-btn.active,
    .iq-choice-btn:hover {
      background: rgba(193,141,92,0.16);
      border-color: rgba(193,141,92,0.36);
    }

    .iq-notes-block {
      max-width: 760px;
      margin: 10px auto 0;
      border-top: 1px solid rgba(24,18,13,0.08);
      padding-top: 16px;
    }

    .iq-notes-label {
      font-size: 0.92rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .iq-notes-textarea {
      width: 100%;
      min-height: 96px;
      resize: vertical;
      border-radius: 18px;
      border: 1px solid rgba(24,18,13,0.08);
      background: rgba(255,255,255,0.52);
      color: var(--text-dark);
      padding: 12px 14px;
      outline: none;
      margin-bottom: 12px;
    }

    .iq-notes-textarea:focus {
      border-color: rgba(193,141,92,0.32);
      box-shadow: 0 0 0 1px rgba(193,141,92,0.15);
    }

    .iq-flavor-label {
      font-size: 0.82rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted-dark);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .iq-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .iq-tag {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(193,141,92,0.24);
      background: #fff;
      color: var(--gold);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .iq-tag.active,
    .iq-tag:hover {
      background: var(--gold);
      color: #fff;
      border-color: var(--gold);

  <div class="page">
    <header>

    <main class="app-shell">

  <div class="modal-backdrop" id="addBottleModal">
    <div class="modal">
      <div class="modal-title">Add Bottle</div>
      <div class="modal-copy">Start a new Whiskey IQ rating by entering the bottle you want to score.</div>

        <button class="modal-primary" type="button" id="confirmAddBottle">Start Rating</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "dags_whiskeyiq_bottles_v5";

    const categories = [
      {
        key: "aroma",
        label: "Aroma",
        max: 25,
        type: "range",
        question: "How do you like the smell?",
        emojiMap: [
          { min: 0, emoji: "😕", text: "Weak" },
          { min: 6, emoji: "🙂", text: "Good" },
          { min: 13, emoji: "😍", text: "Great" },
          { min: 21, emoji: "🤩", text: "Amazing" }
        ]
      },
      {
        key: "flavor",
        label: "Flavor",
        max: 30,
        type: "range",
        question: "How does it taste?",
        emojiMap: [
          { min: 0, emoji: "😕", text: "Flat" },
          { min: 8, emoji: "🙂", text: "Solid" },
          { min: 16, emoji: "😋", text: "Delicious" },
          { min: 25, emoji: "🤯", text: "Elite" }
        ]
      },
      {
        key: "finish",
        label: "Finish",
        max: 25,
        type: "range",
        question: "How long does the finish last?",
        emojiMap: [
          { min: 0, emoji: "😐", text: "Short" },
          { min: 6, emoji: "🙂", text: "Nice" },
          { min: 13, emoji: "😍", text: "Long" },
          { min: 21, emoji: "🔥", text: "Outstanding" }
        ]
      },
   {
  key: "drinkAgain",
  label: "Drink Again",
  max: 5,
  type: "choice",
  question: "Would you drink this again?",
  choices: [
    { label: "Yes", value: 5, emoji: "🥃", note: "Yes" },
    { label: "Maybe", value: 2, emoji: "🤔", note: "Maybe" },
    { label: "No", value: 0, emoji: "🙅", note: "No" }
  ]
}
      {
  key: "recommend",
  label: "Recommend",
  max: 5,
  type: "choice",
  question: "Would you recommend this?",
  choices: [
    { label: "Yes", value: 5, emoji: "💯", note: "Yes" },
    { label: "No", value: 0, emoji: "👎", note: "No" }
  ]
}
      {
        key: "value",
        label: "Value",
        max: 10,
        type: "range",
        question: "Is it worth the price?",
        emojiMap: [
          { min: 0, emoji: "😕", text: "Low" },
          { min: 3, emoji: "🙂", text: "Fair" },
          { min: 6, emoji: "😍", text: "Strong" },
          { min: 9, emoji: "🔥", text: "Elite value" }
        ]
      }
    ];

    const flavorTags = [
      "vanilla", "caramel", "oak", "honey", "spice", "smoke",
      "fruit", "floral", "cherry", "leather", "corn", "rye",
      "citrus", "pepper", "chocolate", "butter", "coffee", "mint"
    ];

    const homeScreen = document.getElementById("homeScreen");
    const ratingScreen = document.getElementById("ratingScreen");
    const bottleListEl = document.getElementById("bottleList");
    const collectionCountEl = document.getElementById("collectionCount");
    const searchInput = document.getElementById("searchInput");
    const sortBtn = document.getElementById("sortBtn");
    const sidebarEl = document.getElementById("iqSidebar");
    const stagesEl = document.getElementById("iqStages");
    const bottleTitleDisplay = document.getElementById("bottleTitleDisplay");
    const iqThemeToggle = document.getElementById("iqThemeToggle");
    const iqThemeIcon = document.getElementById("iqThemeIcon");
    const addBottleModal = document.getElementById("addBottleModal");

    let currentSort = "score";
    let currentBottleId = null;

    const appState = {
      theme: localStorage.getItem("dags_whiskeyiq_theme") || "light",
      bottles: loadBottles()
    };

    function defaultBottle(name = "New Bottle", proof = "", type = "Bourbon") {
      return {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
        name,
        proof,
        type,
        notes: "",
        tags: [],
        statuses: {
          wantToTry: false,
          onShelf: false,
          finished: false
        },
        scores: {
          aroma: 0,
          flavor: 0,
          finish: 0,
          drinkAgain: 0,
          recommend: 0,
          value: 0
        },
        createdAt: new Date().toISOString(),
        activeStage: 0
      };
    }

    function loadBottles() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        return JSON.parse(raw);
      } catch {
        return [];
      }
    }

    function saveBottles() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appState.bottles));
    }

    function clamp(num, min, max) {
      return Math.max(min, Math.min(max, num));
    }

    function getBottleById(id) {
      return appState.bottles.find(b => b.id === id);
    }

    function totalScore(scores) {
      return Object.values(scores).reduce((a, b) => a + Number(b || 0), 0);
    }

    function getRangeMeta(cat, value) {
      let meta = cat.emojiMap[0];
      for (const item of cat.emojiMap) {
        if (value >= item.min) meta = item;
      }
      return meta;
    }

    function getChoiceMeta(cat, value) {
      return cat.choices.find(c => c.value === value) || cat.choices[0];
    }

    function overallEmoji(score) {
      if (score >= 90) return "🏆";
      if (score >= 80) return "🤩";
      if (score >= 70) return "🥃";
      if (score >= 60) return "🙂";
      if (score >= 45) return "😐";
      return "😬";
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setThemeIcon() {
      if (appState.theme === "dark") {
        iqThemeIcon.innerHTML = `<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"></path>`;
      } else {
        iqThemeIcon.innerHTML = `
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="M4.93 4.93l1.41 1.41"></path>
          <path d="M17.66 17.66l1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="M4.93 19.07l1.41-1.41"></path>
          <path d="M17.66 6.34l1.41-1.41"></path>
        `;
      }
    }

    function applyTheme() {
      document.body.classList.toggle("dark-ui", appState.theme === "dark");
      localStorage.setItem("dags_whiskeyiq_theme", appState.theme);
      setThemeIcon();
    }

    function renderHome() {
      let list = [...appState.bottles];
      const search = (searchInput.value || "").trim().toLowerCase();

      if (search) {
        list = list.filter(b =>
          b.name.toLowerCase().includes(search) ||
          (b.type || "").toLowerCase().includes(search) ||
          (b.proof || "").toLowerCase().includes(search)
        );
      }

      if (currentSort === "score") {
        list.sort((a, b) => totalScore(b.scores) - totalScore(a.scores));
      } else {
        list.sort((a, b) => a.name.localeCompare(b.name));
      }

      collectionCountEl.textContent = `${list.length} bottle${list.length === 1 ? "" : "s"}`;

      if (!list.length) {
        bottleListEl.innerHTML = `<div class="empty-state">No bottles yet. Tap the + button to add your first bottle.</div>`;
        return;
      }

      bottleListEl.innerHTML = list.map(bottle => {
        const score = totalScore(bottle.scores);
        return `
          <div class="bottle-card" data-bottle-open="${bottle.id}">
            <div class="bottle-thumb">🥃</div>
            <div>
              <div class="bottle-meta-top">${escapeHtml(bottle.type || "Bourbon")} · ${escapeHtml(bottle.proof || "No")} Proof</div>
              <div class="bottle-name">${escapeHtml(bottle.name)}</div>
            </div>
            <div class="bottle-score">
              <div class="bottle-score-top">${score}<small>/100</small></div>
              <div class="bottle-score-line"><span style="width:${score}%"></span></div>
            </div>
          </div>
        `;
      }).join("");

      document.querySelectorAll("[data-bottle-open]").forEach(el => {
        el.addEventListener("click", () => openBottle(el.dataset.bottleOpen));
      });
    }

    function renderSidebar(bottle) {
      let html = "";

      categories.forEach((cat, index) => {
        const score = Number(bottle.scores[cat.key] || 0);
        const hasValue = score > 0;
        html += `
          <div class="iq-side-item ${bottle.activeStage === index ? "active" : ""}" data-side-stage="${index}">
            <div class="iq-side-label">${cat.label}</div>
            ${hasValue
              ? `<div class="iq-side-score">${score}<small>/${cat.max}</small></div>`
              : `<div class="iq-side-empty">–</div>`
            }
          </div>
        `;
      });

      html += `
        <div class="iq-total ${bottle.activeStage === categories.length ? "active" : ""}" data-side-stage="${categories.length}">
          <div class="iq-total-label">Results</div>
          <div class="iq-total-score">${totalScore(bottle.scores)}<small>/100</small></div>
        </div>
      `;

      sidebarEl.innerHTML = html;

      document.querySelectorAll("[data-side-stage]").forEach(el => {
        el.addEventListener("click", () => {
          bottle.activeStage = Number(el.dataset.sideStage);
          saveBottles();
          renderBottleScreen();
        });
      });
    }

    function renderNotesBlock(bottle) {
      return `
        <div class="iq-notes-block">
          <div class="iq-notes-label">Tasting Notes</div>
          <textarea class="iq-notes-textarea" id="notesInput" placeholder="Add your tasting notes...">${escapeHtml(bottle.notes)}</textarea>

          <div class="iq-flavor-label">Flavor Notes</div>
          <div class="iq-tags">
            ${flavorTags.map(tag => `
              <button type="button" class="iq-tag ${bottle.tags.includes(tag) ? "active" : ""}" data-tag="${tag}">${tag}</button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderBottomRow() {
      return `
        <div class="iq-bottom-row">
          <button class="iq-save-btn" type="button" data-nav="summary">Save</button>
          <button class="iq-share-btn" type="button" id="shareBtn">↗</button>
        </div>
      `;
    }

    function renderRangeStage(bottle, cat, index) {
      const value = Number(bottle.scores[cat.key] || 0);
      const meta = getRangeMeta(cat, value);
      const fillPct = (value / cat.max) * 100;

      return `
        <section class="iq-stage ${bottle.activeStage === index ? "active" : ""}">
          <div class="iq-stage-head">
            <div class="iq-stage-kicker">${cat.label}</div>
            <div class="iq-stage-title">${cat.label}</div>
            <div class="iq-stage-subtitle">${cat.question}</div>
          </div>

          <div class="iq-emoji">${meta.emoji}</div>
          <div class="iq-current-score-label">${value}/${cat.max} ${meta.text}</div>

          <div class="iq-slider-wrap">
            <button class="iq-pm-btn" type="button" data-step="down" data-key="${cat.key}">−</button>

            <div>
              <div class="iq-track-shell">
                <div class="iq-line"></div>
                <div class="iq-fill" style="height:${fillPct}%"></div>
                <input class="iq-range" type="range" min="0" max="${cat.max}" step="1" value="${value}" data-range-key="${cat.key}" />
              </div>

              <div class="iq-manual">
                <input type="number" min="0" max="${cat.max}" step="1" value="${value}" data-input-key="${cat.key}" />
                <small>Type score, then press Enter</small>
              </div>
            </div>

            <button class="iq-pm-btn" type="button" data-step="up" data-key="${cat.key}">+</button>
          </div>

          ${renderNotesBlock(bottle)}
          ${renderBottomRow()}
        </section>
      `;
    }

    function renderChoiceStage(bottle, cat, index) {
      const value = Number(bottle.scores[cat.key] || 0);
      const meta = getChoiceMeta(cat, value);

      return `
        <section class="iq-stage ${bottle.activeStage === index ? "active" : ""}">
          <div class="iq-stage-head">
            <div class="iq-stage-kicker">${cat.label}</div>
            <div class="iq-stage-title">${cat.label}</div>
            <div class="iq-stage-subtitle">${cat.question}</div>
          </div>

          <div class="iq-emoji">${meta.emoji}</div>
          <div class="iq-current-score-label">${value}/${cat.max} ${meta.note}</div>

          <div class="iq-choice-wrap">
            ${cat.choices.map(choice => `
              <button type="button" class="iq-choice-btn ${choice.value === value ? "active" : ""}" data-choice-key="${cat.key}" data-choice-value="${choice.value}">
                ${choice.emoji} ${choice.label}<span>${choice.value}/${cat.max}</span>
              </button>
            `).join("")}
          </div>

          <div class="iq-manual">
            <input type="number" min="0" max="${cat.max}" step="1" value="${value}" data-input-key="${cat.key}" />
            <small>Type score, then press Enter</small>
          </div>

          ${renderNotesBlock(bottle)}
          ${renderBottomRow()}
        </section>
      `;
    }

    function renderSummaryStage(bottle) {
      const total = totalScore(bottle.scores);

      return `
        <section class="iq-stage ${bottle.activeStage === categories.length ? "active" : ""}">
          <div class="iq-summary">
            <div class="iq-summary-hero">
              <div>
                <div class="iq-summary-hero-label">Total Score</div>
                <div class="iq-summary-hero-score">${total}<small>/100</small></div>
              </div>
              <div class="iq-summary-hero-emoji">${overallEmoji(total)}</div>
            </div>

            <div class="iq-summary-grid">
              ${categories.map(cat => `
                <div class="iq-summary-box">
                  <div class="iq-summary-box-label">${cat.label}</div>
                  <div class="iq-summary-box-score">${bottle.scores[cat.key]}<small>/${cat.max}</small></div>
                  <div class="iq-summary-line">
                    <span style="width:${(bottle.scores[cat.key] / cat.max) * 100}%"></span>
                  </div>
                </div>
              `).join("")}
            </div>

            <div class="iq-summary-block">
              <div class="iq-summary-title">Flavor Notes</div>
              <div class="iq-summary-pills">
                ${bottle.tags.length
                  ? bottle.tags.map(tag => `<span class="iq-summary-pill">${escapeHtml(tag)}</span>`).join("")
                  : `<span class="iq-summary-pill">No tags selected</span>`}
              </div>
            </div>

            <div class="iq-summary-block">
              <div class="iq-summary-title">Collection Status</div>
              <div class="iq-status-row">
                <button type="button" class="iq-status-pill ${bottle.statuses.wantToTry ? "active" : ""}" data-status="wantToTry">Want to Try</button>
                <button type="button" class="iq-status-pill ${bottle.statuses.onShelf ? "active" : ""}" data-status="onShelf">On My Shelf</button>
                <button type="button" class="iq-status-pill ${bottle.statuses.finished ? "active" : ""}" data-status="finished">Finished</button>
              </div>
            </div>

            <div class="iq-summary-block">
              <div class="iq-summary-title">Tasting Notes</div>
              <div class="iq-summary-card">
                <div class="iq-summary-text muted">${escapeHtml(bottle.notes || "No tasting notes added.")}</div>
              </div>
            </div>

            <div class="iq-summary-block">
              <div class="iq-summary-actions">
                <button class="iq-save-btn" type="button" data-nav="edit">Edit Rating</button>
                <button class="iq-edit-btn" type="button" id="editBottleBtn">Edit Details</button>
              </div>
            </div>

            <div class="iq-summary-block">
              <button class="iq-delete-btn" type="button" id="deleteBottleBtn">Delete Bourbon</button>
            </div>
          </div>
        </section>
      `;
    }

    function renderBottleScreen() {
      const bottle = getBottleById(currentBottleId);
      if (!bottle) return;

      bottle.activeStage = bottle.activeStage ?? 0;
      bottleTitleDisplay.textContent = bottle.name || "Your Bottle Name";

      renderSidebar(bottle);

      let html = "";
      categories.forEach((cat, index) => {
        html += cat.type === "range"
          ? renderRangeStage(bottle, cat, index)
          : renderChoiceStage(bottle, cat, index);
      });
      html += renderSummaryStage(bottle);
      stagesEl.innerHTML = html;

      attachBottleEvents(bottle);
    }

    function showHome() {
      homeScreen.classList.add("active");
      ratingScreen.classList.remove("active");
      renderHome();
    }

    function openBottle(id) {
      currentBottleId = id;
      homeScreen.classList.remove("active");
      ratingScreen.classList.add("active");
      renderBottleScreen();
    }

    function setupHoldButton(btn, direction, key, bottle) {
      let timer = null;
      let interval = null;

      const run = () => {
        const cat = categories.find(c => c.key === key);
        if (!cat) return;
        const delta = direction === "up" ? 1 : -1;
        bottle.scores[key] = clamp(Number(bottle.scores[key]) + delta, 0, cat.max);
        saveBottles();
        renderBottleScreen();
      };

      const start = (e) => {
        e.preventDefault();
        run();
        timer = setTimeout(() => {
          interval = setInterval(run, 45);
        }, 180);
      };

      const stop = () => {
        clearTimeout(timer);
        clearInterval(interval);
      };

      btn.addEventListener("mousedown", start);
      btn.addEventListener("touchstart", start, { passive: false });
      btn.addEventListener("mouseup", stop);
      btn.addEventListener("mouseleave", stop);
      btn.addEventListener("touchend", stop);
      btn.addEventListener("touchcancel", stop);
    }

    function commitManualInput(input, bottle) {
      const key = input.dataset.inputKey;
      const cat = categories.find(c => c.key === key);
      if (!cat) return;
      const val = Number(input.value || 0);
      bottle.scores[key] = clamp(isNaN(val) ? 0 : val, 0, cat.max);
      saveBottles();
      renderBottleScreen();
    }

    function attachBottleEvents(bottle) {
      const notesInput = document.getElementById("notesInput");
      if (notesInput) {
        notesInput.addEventListener("input", (e) => {
          bottle.notes = e.target.value;
          saveBottles();
        });
      }

      document.querySelectorAll("[data-tag]").forEach(btn => {
        btn.addEventListener("click", () => {
          const tag = btn.dataset.tag;
          if (bottle.tags.includes(tag)) {
            bottle.tags = bottle.tags.filter(t => t !== tag);
          } else {
            bottle.tags.push(tag);
          }
          saveBottles();
          renderBottleScreen();
        });
      });

      document.querySelectorAll("[data-step='down']").forEach(btn => {
        setupHoldButton(btn, "down", btn.dataset.key, bottle);
      });

      document.querySelectorAll("[data-step='up']").forEach(btn => {
        setupHoldButton(btn, "up", btn.dataset.key, bottle);
      });

      document.querySelectorAll("[data-range-key]").forEach(input => {
        input.addEventListener("input", () => {
          const key = input.dataset.rangeKey;
          bottle.scores[key] = Number(input.value);
          saveBottles();
          renderBottleScreen();
        });
      });

      document.querySelectorAll("[data-input-key]").forEach(input => {
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            commitManualInput(input, bottle);
          }
        });
        input.addEventListener("blur", () => {
          commitManualInput(input, bottle);
        });
      });

      document.querySelectorAll("[data-choice-key]").forEach(btn => {
        btn.addEventListener("click", () => {
          const key = btn.dataset.choiceKey;
          bottle.scores[key] = Number(btn.dataset.choiceValue);
          saveBottles();
          renderBottleScreen();
        });
      });

      document.querySelectorAll("[data-nav='summary']").forEach(btn => {
        btn.addEventListener("click", () => {
          bottle.activeStage = categories.length;
          saveBottles();
          renderBottleScreen();
        });
      });

      document.querySelectorAll("[data-nav='edit']").forEach(btn => {
        btn.addEventListener("click", () => {
          bottle.activeStage = 0;
          saveBottles();
          renderBottleScreen();
        });
      });

      document.querySelectorAll("[data-status]").forEach(btn => {
        btn.addEventListener("click", () => {
          const key = btn.dataset.status;
          bottle.statuses[key] = !bottle.statuses[key];
          saveBottles();
          renderBottleScreen();
        });
      });

      const editBottleBtn = document.getElementById("editBottleBtn");
      if (editBottleBtn) {
        editBottleBtn.addEventListener("click", () => {
          document.getElementById("newBottleName").value = bottle.name || "";
          document.getElementById("newBottleProof").value = bottle.proof || "";
          document.getElementById("newBottleType").value = bottle.type || "";
          addBottleModal.classList.add("active");
          addBottleModal.dataset.editId = bottle.id;
        });
      }

      const deleteBottleBtn = document.getElementById("deleteBottleBtn");
      if (deleteBottleBtn) {
        deleteBottleBtn.addEventListener("click", () => {
          const ok = confirm("Delete this bottle?");
          if (!ok) return;
          appState.bottles = appState.bottles.filter(b => b.id !== bottle.id);
          saveBottles();
          currentBottleId = null;
          showHome();
        });
      }

      const shareBtn = document.getElementById("shareBtn");
      if (shareBtn) {
        shareBtn.addEventListener("click", async () => {
          const text = `${bottle.name} — Whiskey IQ Score: ${totalScore(bottle.scores)}/100`;
          if (navigator.share) {
            try {
              await navigator.share({ title: "Whiskey IQ", text });
            } catch (e) {}
          } else {
            try {
              await navigator.clipboard.writeText(text);
              alert("Score copied to clipboard");
            } catch (e) {
              alert(text);
            }
          }
        });
      }
    }

    function openAddBottleModal() {
      addBottleModal.dataset.editId = "";
      document.getElementById("newBottleName").value = "";
      document.getElementById("newBottleProof").value = "";
      document.getElementById("newBottleType").value = "Bourbon";
      addBottleModal.classList.add("active");
    }

    function closeAddBottleModal() {
      addBottleModal.classList.remove("active");
      addBottleModal.dataset.editId = "";
    }

    function confirmAddOrEditBottle() {
      const name = document.getElementById("newBottleName").value.trim();
      const proof = document.getElementById("newBottleProof").value.trim();
      const type = document.getElementById("newBottleType").value.trim() || "Bourbon";

      if (!name) {
        alert("Enter a bottle name.");
        return;
      }

      const editId = addBottleModal.dataset.editId;
      if (editId) {
        const bottle = getBottleById(editId);
        if (bottle) {
          bottle.name = name;
          bottle.proof = proof;
          bottle.type = type;
          saveBottles();
          closeAddBottleModal();
          openBottle(bottle.id);
          return;
        }
      }

      const bottle = defaultBottle(name, proof, type);
      appState.bottles.unshift(bottle);
      saveBottles();
      closeAddBottleModal();
      openBottle(bottle.id);
    }

    searchInput.addEventListener("input", renderHome);

    sortBtn.addEventListener("click", () => {
      currentSort = currentSort === "score" ? "name" : "score";
      sortBtn.textContent = currentSort === "score" ? "Score ↓" : "Name ↓";
      renderHome();
    });

    document.getElementById("addBottleFab").addEventListener("click", openAddBottleModal);
    document.getElementById("cancelAddBottle").addEventListener("click", closeAddBottleModal);
    document.getElementById("confirmAddBottle").addEventListener("click", confirmAddOrEditBottle);
    document.getElementById("backToHomeBtn").addEventListener("click", showHome);

    addBottleModal.addEventListener("click", (e) => {
      if (e.target === addBottleModal) closeAddBottleModal();
    });

    iqThemeToggle.addEventListener("click", () => {
      appState.theme = appState.theme === "dark" ? "light" : "dark";
      applyTheme();
    });

    applyTheme();
    renderHome();
  </script>
</body>
</html>

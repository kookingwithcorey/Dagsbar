<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DAGS | Whiskey IQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #050608;
      --bg-alt: #11141a;
      --accent: #0f8b6b;
      --accent-soft: rgba(15, 139, 107, 0.3);
      --text: #f7f7f7;
      --muted: #a3acb9;
      --border: rgba(255, 255, 255, 0.12);
      --radius-lg: 18px;

      --iq-cream: #efe7dd;
      --iq-cream-2: #f7f1ea;
      --iq-navy: #13264f;
      --iq-navy-2: #0f1d3d;
      --iq-gold: #c3915e;
      --iq-gold-soft: rgba(195, 145, 94, 0.18);
      --iq-line: #d9d0c5;
      --iq-text-dark: #171411;
      --iq-muted-dark: #8d7e72;
      --iq-danger: #d89a9a;
      --iq-blue: #4b97df;
    }

    body.light-mode {
      --bg: #efe6dc;
      --bg-alt: #f5ede5;
      --accent: #0f8b6b;
      --accent-soft: rgba(15, 139, 107, 0.2);
      --text: #1f1c1a;
      --muted: #7f7267;
      --border: rgba(47, 34, 22, 0.1);
      --iq-cream: #efe7dd;
      --iq-cream-2: #f7f1ea;
      --iq-navy: #13264f;
      --iq-navy-2: #0f1d3d;
      --iq-gold: #bc9169;
      --iq-gold-soft: rgba(188, 145, 105, 0.18);
      --iq-line: #d8cec1;
      --iq-text-dark: #171411;
      --iq-muted-dark: #8d7e72;
      --iq-danger: #c77f7f;
      --iq-blue: #4b97df;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #202735 0, #050608 55%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body.light-mode {
      background: radial-gradient(circle at top, #f6efe7 0, #efe6dc 65%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .page {
      width: 100%;
      max-width: 1220px;
      padding: 24px 16px 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.28em;
    }

    .brand-link,
    .brand-link:link,
    .brand-link:visited,
    .brand-link:hover,
    .brand-link:active {
      display: inline-block;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
    }

    .brand-link .brand-title {
      color: var(--text);
      text-decoration: none;
    }

    .brand-link .brand-subtitle {
      color: var(--muted);
      text-decoration: none;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    nav a {
      font-size: 0.85rem;
      text-decoration: none;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: all 0.18s ease;
    }

    nav a:hover {
      border-color: var(--border);
      color: var(--text);
      background: rgba(255, 255, 255, 0.02);
    }

    nav a.active {
      border-color: var(--accent-soft);
      background: rgba(15, 139, 107, 0.12);
      color: var(--text);
    }

    .theme-btn {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.18s ease;
      font-size: 1rem;
    }

    .theme-btn:hover {
      transform: translateY(-1px);
      border-color: var(--accent-soft);
      background: rgba(255, 255, 255, 0.07);
    }

    .card {
      background: rgba(10, 12, 18, 0.92);
      border-radius: 24px;
      border: 1px solid var(--border);
      padding: 20px;
      box-shadow: 0 18px 80px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    .iq-shell {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      background: var(--iq-cream);
      border-radius: 22px;
      overflow: hidden;
      min-height: 900px;
      color: var(--iq-text-dark);
    }

    .iq-left {
      background: var(--iq-navy);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .iq-side-item {
      padding: 18px 16px;
      min-height: 118px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
      cursor: pointer;
      transition: background 0.12s linear;
      background: var(--iq-navy);
    }

    .iq-side-item:hover {
      background: var(--iq-navy-2);
    }

    .iq-side-item.active {
      background: linear-gradient(135deg, rgba(15,139,107,0.3), rgba(195,145,94,0.18));
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .iq-side-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-weight: 700;
      color: rgba(255,255,255,0.78);
      margin-bottom: 14px;
    }

    .iq-side-score {
      font-size: 2.65rem;
      line-height: 1;
      font-weight: 800;
    }

    .iq-side-score small {
      font-size: 0.34em;
      color: rgba(255,255,255,0.55);
      font-weight: 600;
      margin-left: 4px;
    }

    .iq-side-empty {
      font-size: 2rem;
      line-height: 1;
      color: rgba(255,255,255,0.38);
      margin-top: 8px;
      font-weight: 700;
    }

    .iq-total {
      margin-top: auto;
      padding: 22px 18px;
      background: #0d2844;
      cursor: pointer;
    }

    .iq-total.active {
      background: linear-gradient(135deg, rgba(15,139,107,0.3), rgba(195,145,94,0.18));
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .iq-total-label {
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
      margin-bottom: 14px;
      color: rgba(255,255,255,0.82);
    }

    .iq-total-score {
      font-size: 3.2rem;
      line-height: 1;
      font-weight: 800;
      color: #fff;
    }

    .iq-total-score small {
      font-size: 0.34em;
      color: rgba(255,255,255,0.7);
      margin-left: 4px;
      font-weight: 600;
    }

    .iq-right {
      background: var(--iq-cream);
      color: var(--iq-text-dark);
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .iq-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 22px;
      border-bottom: 1px solid rgba(23,20,17,0.08);
      background: rgba(255,255,255,0.18);
    }

    .iq-back {
      border: none;
      background: transparent;
      color: var(--iq-text-dark);
      font-size: 1.7rem;
      line-height: 1;
      cursor: pointer;
      padding: 4px;
    }

    .iq-bottle-name {
      font-size: clamp(1.1rem, 2.2vw, 1.7rem);
      font-weight: 700;
      text-align: center;
      flex: 1;
      font-family: Georgia, "Times New Roman", serif;
    }

    .iq-top-spacer {
      width: 28px;
      flex-shrink: 0;
    }

    .iq-stage {
      display: none;
      padding: 24px 28px 24px;
      flex: 1;
    }

    .iq-stage.active {
      display: block;
    }

    .iq-stage-head {
      text-align: center;
      margin-bottom: 10px;
    }

    .iq-stage-kicker {
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--iq-gold);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .iq-stage-title {
      font-size: clamp(2.3rem, 5vw, 3.5rem);
      line-height: 1;
      font-weight: 700;
      font-family: Georgia, "Times New Roman", serif;
      margin-bottom: 6px;
      color: #16110d;
    }

    .iq-stage-subtitle {
      font-size: 1.15rem;
      color: var(--iq-muted-dark);
    }

    .iq-emoji {
      text-align: center;
      font-size: 4rem;
      line-height: 1;
      min-height: 76px;
      margin: 14px 0 8px;
    }

    .iq-current-score-label {
      text-align: center;
      font-size: 1rem;
      color: var(--iq-muted-dark);
      margin-bottom: 8px;
      min-height: 30px;
    }

    .iq-slider-wrap {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) 88px;
      align-items: center;
      gap: 12px;
      margin: 10px auto 8px;
      max-width: 620px;
      min-height: 470px;
    }

    .iq-pm-btn {
      width: 70px;
      height: 70px;
      border-radius: 999px;
      border: 1px solid rgba(23,20,17,0.08);
      background: rgba(255,255,255,0.7);
      color: var(--iq-blue);
      font-size: 2.8rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      cursor: pointer;
      transition: transform 0.03s linear;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      user-select: none;
    }

    .iq-pm-btn:active {
      transform: scale(0.97);
    }

    .iq-track-shell {
      position: relative;
      height: 460px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .iq-line {
      position: absolute;
      top: 18px;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      background: var(--iq-line);
      border-radius: 999px;
    }

    .iq-line::before,
    .iq-line::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 4px;
      background: #17120d;
      border-radius: 999px;
    }

    .iq-line::before { top: 0; }
    .iq-line::after { bottom: 0; }

    .iq-fill {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 4px;
      background: linear-gradient(180deg, var(--iq-gold), #8c6f52);
      border-radius: 999px;
      opacity: 0.42;
      transition: none;
    }

    .iq-range {
      -webkit-appearance: none;
      appearance: none;
      width: 460px;
      height: 56px;
      transform: rotate(-90deg);
      background: transparent;
      position: relative;
      z-index: 3;
      cursor: pointer;
      margin: 0;
    }

    .iq-range::-webkit-slider-runnable-track {
      height: 4px;
      background: transparent;
    }

    .iq-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1c140f;
      border: 5px solid rgba(255,255,255,0.88);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
      margin-top: -18px;
    }

    .iq-range::-moz-range-track {
      height: 4px;
      background: transparent;
    }

    .iq-range::-moz-range-thumb {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1c140f;
      border: 5px solid rgba(255,255,255,0.88);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }

    .iq-manual {
      max-width: 200px;
      margin: 0 auto 10px;
      text-align: center;
    }

    .iq-manual input {
      width: 100%;
      border: none;
      background: transparent;
      color: #17120d;
      font-size: clamp(2.7rem, 7vw, 4.4rem);
      line-height: 1;
      font-weight: 800;
      text-align: center;
      outline: none;
    }

    .iq-manual small {
      display: block;
      font-size: 0.78rem;
      color: var(--iq-muted-dark);
      margin-top: 4px;
    }

    .iq-choice-wrap {
      max-width: 520px;
      margin: 20px auto 10px;
      display: grid;
      gap: 12px;
    }

    .iq-choice-btn {
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(23,20,17,0.08);
      background: rgba(255,255,255,0.55);
      color: #17120d;
      padding: 16px 18px;
      text-align: left;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .iq-choice-btn span {
      color: var(--iq-muted-dark);
      font-weight: 500;
      margin-left: 8px;
    }

    .iq-choice-btn.active,
    .iq-choice-btn:hover {
      background: rgba(195,145,94,0.16);
      border-color: rgba(195,145,94,0.36);
    }

    .iq-notes-block {
      max-width: 760px;
      margin: 10px auto 0;
      border-top: 1px solid rgba(23,20,17,0.08);
      padding-top: 16px;
    }

    .iq-notes-label {
      font-size: 0.92rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--iq-gold);
      margin-bottom: 12px;
    }

    .iq-notes-textarea {
      width: 100%;
      min-height: 96px;
      resize: vertical;
      border-radius: 18px;
      border: 1px solid rgba(23,20,17,0.08);
      background: rgba(255,255,255,0.52);
      color: #17120d;
      padding: 12px 14px;
      outline: none;
      margin-bottom: 12px;
    }

    .iq-notes-textarea:focus {
      border-color: rgba(195,145,94,0.32);
      box-shadow: 0 0 0 1px rgba(195,145,94,0.15);
    }

    .iq-flavor-label {
      font-size: 0.82rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--iq-muted-dark);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .iq-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .iq-tag {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(195,145,94,0.24);
      background: #fff;
      color: var(--iq-gold);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .iq-tag.active,
    .iq-tag:hover {
      background: var(--iq-gold);
      color: #fff;
      border-color: var(--iq-gold);
    }

    .iq-bottom-row {
      max-width: 760px;
      margin: 18px auto 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 68px;
      gap: 12px;
      align-items: center;
    }

    .iq-save-btn {
      width: 100%;
      border-radius: 16px;
      padding: 16px 18px;
      border: none;
      background: #1a0f08;
      color: #fff;
      font-size: 1.15rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.18s ease;
      min-height: 62px;
    }

    .iq-save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.12);
    }

    .iq-share-btn {
      width: 68px;
      height: 62px;
      border-radius: 16px;
      border: 1px solid rgba(23,20,17,0.08);
      background: rgba(255,255,255,0.7);
      color: var(--iq-muted-dark);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      cursor: pointer;
    }

    .iq-summary {
      max-width: 820px;
      margin: 0 auto;
    }

    .iq-summary-hero {
      background: var(--iq-navy);
      color: #fff;
      border-radius: 22px;
      padding: 20px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .iq-summary-hero-label {
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .iq-summary-hero-score {
      font-size: clamp(3.4rem, 9vw, 5.3rem);
      line-height: 1;
      font-weight: 800;
    }

    .iq-summary-hero-score small {
      font-size: 0.34em;
      color: rgba(255,255,255,0.72);
      margin-left: 4px;
      font-weight: 600;
    }

    .iq-summary-hero-emoji {
      font-size: clamp(3rem, 7vw, 4.5rem);
      line-height: 1;
      flex-shrink: 0;
    }

    .iq-summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .iq-summary-box {
      background: rgba(255,255,255,0.62);
      border-radius: 20px;
      padding: 16px 18px;
      border: 1px solid rgba(23,20,17,0.06);
    }

    .iq-summary-box-label {
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--iq-gold);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .iq-summary-box-score {
      font-size: 2.4rem;
      line-height: 1;
      font-weight: 800;
      color: #17120d;
      margin-bottom: 12px;
    }

    .iq-summary-box-score small {
      font-size: 0.38em;
      color: var(--iq-muted-dark);
      margin-left: 4px;
      font-weight: 600;
    }

    .iq-summary-line {
      height: 5px;
      background: rgba(23,20,17,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .iq-summary-line span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--iq-gold), #ead9ca);
    }

    .iq-summary-block {
      margin-top: 14px;
    }

    .iq-summary-title {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--iq-muted-dark);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .iq-summary-card {
      background: rgba(255,255,255,0.62);
      border-radius: 18px;
      padding: 14px 16px;
      border: 1px solid rgba(23,20,17,0.06);
    }

    .iq-summary-text {
      font-size: 0.96rem;
      color: #17120d;
    }

    .iq-summary-text.muted {
      color: var(--iq-muted-dark);
      white-space: pre-wrap;
    }

    .iq-summary-pills,
    .iq-status-row,
    .iq-summary-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .iq-summary-pill {
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff;
      color: var(--iq-gold);
      border: 1px solid rgba(195,145,94,0.24);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .iq-status-pill {
      padding: 11px 16px;
      border-radius: 14px;
      border: 1px solid rgba(23,20,17,0.08);
      background: rgba(255,255,255,0.7);
      color: #17120d;
      font-weight: 700;
      font-size: 0.96rem;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .iq-status-pill.active {
      background: rgba(195,145,94,0.16);
      border-color: rgba(195,145,94,0.34);
    }

    .iq-summary-actions .iq-save-btn,
    .iq-summary-actions .iq-edit-btn {
      flex: 1 1 220px;
      min-height: 62px;
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 1.1rem;
      font-weight: 800;
    }

    .iq-edit-btn {
      border: 1px solid rgba(23,20,17,0.08);
      background: rgba(255,255,255,0.74);
      color: #17120d;
      cursor: pointer;
    }

    .iq-delete-btn {
      width: 100%;
      border-radius: 16px;
      padding: 16px 18px;
      border: 1px solid rgba(216,154,154,0.5);
      background: rgba(255,255,255,0.46);
      color: var(--iq-danger);
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
    }

    @media (max-width: 980px) {
      .iq-shell {
        grid-template-columns: 190px minmax(0, 1fr);
      }

      .iq-side-item {
        min-height: 104px;
      }

      .iq-slider-wrap {
        grid-template-columns: 72px minmax(0, 1fr) 72px;
      }

      .iq-pm-btn {
        width: 58px;
        height: 58px;
        font-size: 2.4rem;
      }
    }

    @media (max-width: 840px) {
      .iq-shell {
        grid-template-columns: 1fr;
      }

      .iq-left {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .iq-side-item {
        min-height: 96px;
      }

      .iq-total {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 720px) {
      .page {
        padding: 16px 10px 34px;
      }

      .header-right {
        width: 100%;
      }

      nav {
        width: 100%;
      }

      .card {
        padding: 10px;
        border-radius: 20px;
      }

      .iq-shell {
        border-radius: 16px;
        min-height: auto;
      }

      .iq-left {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .iq-side-item {
        min-height: 96px;
        padding: 12px;
      }

      .iq-side-score {
        font-size: 2rem;
      }

      .iq-right {
        min-width: 0;
      }

      .iq-topbar {
        padding: 12px 14px;
      }

      .iq-bottle-name {
        font-size: 1.08rem;
      }

      .iq-stage {
        padding: 16px 12px 18px;
      }

      .iq-stage-title {
        font-size: 2.2rem;
      }

      .iq-stage-subtitle {
        font-size: 1rem;
      }

      .iq-slider-wrap {
        grid-template-columns: 58px minmax(0, 1fr) 58px;
        gap: 8px;
        min-height: 360px;
      }

      .iq-track-shell {
        height: 350px;
      }

      .iq-range {
        width: 350px;
      }

      .iq-pm-btn {
        width: 50px;
        height: 50px;
        font-size: 2rem;
      }

      .iq-manual input {
        font-size: 3rem;
      }

      .iq-bottom-row {
        grid-template-columns: 1fr 58px;
      }

      .iq-share-btn {
        width: 58px;
        height: 58px;
      }

      .iq-summary-grid {
        grid-template-columns: 1fr;
      }

      .iq-summary-actions {
        flex-direction: column;
      }

      .iq-summary-actions .iq-save-btn,
      .iq-summary-actions .iq-edit-btn {
        width: 100%;
      }
    }

    @media print {
      @page {
        size: letter portrait;
        margin: 0.25in;
      }

      body {
        background: #ffffff !important;
      }

      header nav,
      .theme-btn,
      .iq-back,
      .iq-bottom-row,
      .iq-summary-actions,
      .iq-delete-btn {
        display: none !important;
      }

      .page {
        max-width: 100% !important;
        padding: 0.15in 0.2in !important;
      }

      .card {
        background: #ffffff !important;
        box-shadow: none !important;
        border-color: #dddddd !important;
      }

      .iq-shell,
      .iq-right,
      .iq-left,
      .iq-summary-card,
      .iq-summary-box,
      .iq-summary-hero {
        background: #ffffff !important;
        color: #000 !important;
        box-shadow: none !important;
      }

      .iq-stage {
        display: none !important;
      }

      .iq-stage.print-summary {
        display: block !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <a href="index.html" class="brand-link" aria-label="Return to Home">
        <div class="brand">
          <div class="brand-title">DAGS</div>
          <div class="brand-subtitle">Bourbon & Whiskey Lounge</div>
        </div>
      </a>

      <div class="header-right">
        <nav>
          <a href="menu.html">Whiskey List</a>
          <a href="menu-print.html">Printable Menu</a>
          <a href="tasting.html">Tasting Sheet</a>
          <a href="blind-tasting.html">Blind Tasting</a>
          <a href="history.html">Whiskey Log</a>
          <a href="whiskeyiq.html" class="active">Whiskey IQ</a>
          <a href="https://dramhub.lovable.app" target="_blank" rel="noopener">Dramhub</a>
        </nav>
        <button class="theme-btn" id="themeToggle" type="button" aria-label="Toggle theme">☀️</button>
      </div>
    </header>

    <main class="card">
      <div class="iq-shell">
        <aside class="iq-left" id="iqSidebar"></aside>

        <section class="iq-right">
          <div class="iq-topbar">
            <button class="iq-back" type="button" onclick="window.location.href='index.html'" aria-label="Back">‹</button>
            <div class="iq-bottle-name" id="bottleTitleDisplay">Your Bottle Name</div>
            <div class="iq-top-spacer"></div>
          </div>

          <div id="iqStages"></div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const categories = [
      {
        key: "aroma",
        label: "Aroma",
        max: 25,
        type: "range",
        question: "How do you like the smell?",
        emojiMap: [
          { min: 0, emoji: "😕", text: "Weak" },
          { min: 6, emoji: "🙂", text: "Good" },
          { min: 13, emoji: "😍", text: "Great" },
          { min: 21, emoji: "🤩", text: "Amazing" }
        ]
      },
      {
        key: "flavor",
        label: "Flavor",
        max: 30,
        type: "range",
        question: "How does it taste?",
        emojiMap: [
          { min: 0, emoji: "😕", text: "Flat" },
          { min: 8, emoji: "🙂", text: "Solid" },
          { min: 16, emoji: "😋", text: "Delicious" },
          { min: 25, emoji: "🤯", text: "Elite" }
        ]
      },
      {
        key: "finish",
        label: "Finish",
        max: 25,
        type: "range",
        question: "How long does the finish last?",
        emojiMap: [
          { min: 0, emoji: "😐", text: "Short" },
          { min: 6, emoji: "🙂", text: "Nice" },
          { min: 13, emoji: "😍", text: "Long" },
          { min: 21, emoji: "🔥", text: "Outstanding" }
        ]
      },
      {
        key: "drinkAgain",
        label: "Drink Again",
        max: 5,
        type: "choice",
        question: "Would you drink this again?",
        choices: [
          { label: "No", value: 0, emoji: "🙅", note: "No" },
          { label: "Maybe", value: 2, emoji: "🤔", note: "Maybe" },
          { label: "Yes", value: 5, emoji: "🥃", note: "Yes" }
        ]
      },
      {
        key: "recommend",
        label: "Recommend",
        max: 5,
        type: "choice",
        question: "Would you recommend this?",
        choices: [
          { label: "No", value: 0, emoji: "👎", note: "No" },
          { label: "Yes", value: 5, emoji: "💯", note: "Yes" }
        ]
      },
      {
        key: "value",
        label: "Value",
        max: 10,
        type: "range",
        question: "Is it worth the price?",
        emojiMap: [
          { min: 0, emoji: "😞", text: "Poor value" },
          { min: 3, emoji: "🙂", text: "Fair" },
          { min: 6, emoji: "😍", text: "Great value" },
          { min: 9, emoji: "🤑", text: "Steal" }
        ]
      }
    ];

    const flavorTags = [
      "vanilla", "caramel", "oak", "honey", "spice", "smoke",
      "fruit", "floral", "cherry", "leather", "corn", "rye",
      "citrus", "pepper", "chocolate", "butter", "coffee", "mint"
    ];

    const state = {
      bottleName: "Silk Velvet Cask Strength Bourbon",
      notes: "",
      tags: [],
      activeStage: 0,
      theme: localStorage.getItem("dags_whiskeyiq_theme") || "dark",
      statuses: {
        wantToTry: false,
        onShelf: false,
        finished: false
      },
      scores: {
        aroma: 0,
        flavor: 0,
        finish: 0,
        drinkAgain: 0,
        recommend: 0,
        value: 0
      }
    };

    const sidebarEl = document.getElementById("iqSidebar");
    const stagesEl = document.getElementById("iqStages");
    const bottleTitleDisplay = document.getElementById("bottleTitleDisplay");
    const themeToggle = document.getElementById("themeToggle");

    function clamp(num, min, max) {
      return Math.max(min, Math.min(max, num));
    }

    function totalScore() {
      return Object.values(state.scores).reduce((a, b) => a + Number(b || 0), 0);
    }

    function getRangeMeta(cat, value) {
      let meta = cat.emojiMap[0];
      for (const item of cat.emojiMap) {
        if (value >= item.min) meta = item;
      }
      return meta;
    }

    function getChoiceMeta(cat, value) {
      return cat.choices.find(c => c.value === value) || cat.choices[0];
    }

    function overallEmoji(score) {
      if (score >= 90) return "🏆";
      if (score >= 80) return "🤩";
      if (score >= 70) return "🥃";
      if (score >= 60) return "🙂";
      if (score >= 45) return "😐";
      return "😬";
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function applyTheme() {
      document.body.classList.toggle("light-mode", state.theme === "light");
      themeToggle.textContent = state.theme === "light" ? "🌙" : "☀️";
      localStorage.setItem("dags_whiskeyiq_theme", state.theme);
    }

    function renderSidebar() {
      let html = "";

      categories.forEach((cat, index) => {
        const score = Number(state.scores[cat.key] || 0);
        const hasValue = score > 0;

        html += `
          <div class="iq-side-item ${state.activeStage === index ? "active" : ""}" data-side-stage="${index}">
            <div class="iq-side-label">${cat.label}</div>
            ${
              hasValue
                ? `<div class="iq-side-score">${score}<small>/${cat.max}</small></div>`
                : `<div class="iq-side-empty">–</div>`
            }
          </div>
        `;
      });

      html += `
        <div class="iq-total ${state.activeStage === categories.length ? "active" : ""}" data-side-stage="${categories.length}">
          <div class="iq-total-label">Total</div>
          <div class="iq-total-score">${totalScore()}<small>/100</small></div>
        </div>
      `;

      sidebarEl.innerHTML = html;

      document.querySelectorAll("[data-side-stage]").forEach(el => {
        el.addEventListener("click", () => {
          state.activeStage = Number(el.dataset.sideStage);
          render();
        });
      });
    }

    function renderNotesBlock() {
      return `
        <div class="iq-notes-block">
          <div class="iq-notes-label">Tasting Notes</div>
          <textarea
            class="iq-notes-textarea"
            id="notesInput"
            placeholder="Add your tasting notes..."
          >${escapeHtml(state.notes)}</textarea>

          <div class="iq-flavor-label">Flavor Notes</div>
          <div class="iq-tags">
            ${flavorTags.map(tag => `
              <button
                type="button"
                class="iq-tag ${state.tags.includes(tag) ? "active" : ""}"
                data-tag="${tag}"
              >${tag}</button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderBottomRow() {
      return `
        <div class="iq-bottom-row">
          <button class="iq-save-btn" type="button" data-nav="summary">Save</button>
          <button class="iq-share-btn" type="button" title="Share" id="shareBtn">↗</button>
        </div>
      `;
    }

    function renderRangeStage(cat, index) {
      const value = Number(state.scores[cat.key] || 0);
      const meta = getRangeMeta(cat, value);
      const fillPct = (value / cat.max) * 100;

      return `
        <section class="iq-stage ${state.activeStage === index ? "active" : ""}">
          <div class="iq-stage-head">
            <div class="iq-stage-kicker">${cat.label}</div>
            <div class="iq-stage-title">${cat.label}</div>
            <div class="iq-stage-subtitle">${cat.question}</div>
          </div>

          <div class="iq-emoji">${meta.emoji}</div>
          <div class="iq-current-score-label">${value}/${cat.max} ${meta.text}</div>

          <div class="iq-slider-wrap">
            <button class="iq-pm-btn" type="button" data-step="down" data-key="${cat.key}">−</button>

            <div>
              <div class="iq-track-shell">
                <div class="iq-line"></div>
                <div class="iq-fill" style="height:${fillPct}%"></div>
                <input
                  class="iq-range"
                  type="range"
                  min="0"
                  max="${cat.max}"
                  step="1"
                  value="${value}"
                  data-range-key="${cat.key}"
                />
              </div>

              <div class="iq-manual">
                <input
                  type="number"
                  min="0"
                  max="${cat.max}"
                  step="1"
                  value="${value}"
                  data-input-key="${cat.key}"
                />
                <small>Type the score or use the slider / plus / minus</small>
              </div>
            </div>

            <button class="iq-pm-btn" type="button" data-step="up" data-key="${cat.key}">+</button>
          </div>

          ${renderNotesBlock()}
          ${renderBottomRow()}
        </section>
      `;
    }

    function renderChoiceStage(cat, index) {
      const value = Number(state.scores[cat.key] || 0);
      const meta = getChoiceMeta(cat, value);

      return `
        <section class="iq-stage ${state.activeStage === index ? "active" : ""}">
          <div class="iq-stage-head">
            <div class="iq-stage-kicker">${cat.label}</div>
            <div class="iq-stage-title">${cat.label}</div>
            <div class="iq-stage-subtitle">${cat.question}</div>
          </div>

          <div class="iq-emoji">${meta.emoji}</div>
          <div class="iq-current-score-label">${value}/${cat.max} ${meta.note}</div>

          <div class="iq-choice-wrap">
            ${cat.choices.map(choice => `
              <button
                type="button"
                class="iq-choice-btn ${choice.value === value ? "active" : ""}"
                data-choice-key="${cat.key}"
                data-choice-value="${choice.value}"
              >
                ${choice.emoji} ${choice.label}<span>${choice.value}/${cat.max}</span>
              </button>
            `).join("")}
          </div>

          <div class="iq-manual">
            <input
              type="number"
              min="0"
              max="${cat.max}"
              step="1"
              value="${value}"
              data-input-key="${cat.key}"
            />
            <small>Manual score input also works here</small>
          </div>

          ${renderNotesBlock()}
          ${renderBottomRow()}
        </section>
      `;
    }

    function renderSummaryStage() {
      const total = totalScore();

      return `
        <section class="iq-stage ${state.activeStage === categories.length ? "active print-summary" : ""}">
          <div class="iq-summary">
            <div class="iq-summary-hero">
              <div>
                <div class="iq-summary-hero-label">Total Score</div>
                <div class="iq-summary-hero-score">${total}<small>/100</small></div>
              </div>
              <div class="iq-summary-hero-emoji">${overallEmoji(total)}</div>
            </div>

            <div class="iq-summary-grid">
              ${categories.map(cat => `
                <div class="iq-summary-box">
                  <div class="iq-summary-box-label">${cat.label}</div>
                  <div class="iq-summary-box-score">${state.scores[cat.key]}<small>/${cat.max}</small></div>
                  <div class="iq-summary-line">
                    <span style="width:${(state.scores[cat.key] / cat.max) * 100}%"></span>
                  </div>
                </div>
              `).join("")}
            </div>

            <div class="iq-summary-block">
              <div class="iq-summary-title">Flavor Notes</div>
              <div class="iq-summary-pills">
                ${state.tags.length
                  ? state.tags.map(tag => `<span class="iq-summary-pill">${escapeHtml(tag)}</span>`).join("")
                  : `<span class="iq-summary-pill">No tags selected</span>`}
              </div>
            </div>

            <div class="iq-summary-block">
              <div class="iq-summary-title">Collection Status</div>
              <div class="iq-status-row">
                <button type="button" class="iq-status-pill ${state.statuses.wantToTry ? "active" : ""}" data-status="wantToTry">🥃 Want to Try</button>
                <button type="button" class="iq-status-pill ${state.statuses.onShelf ? "active" : ""}" data-status="onShelf">🥃 On My Shelf</button>
                <button type="button" class="iq-status-pill ${state.statuses.finished ? "active" : ""}" data-status="finished">✓ Finished</button>
              </div>
            </div>

            <div class="iq-summary-block">
              <div class="iq-summary-title">Tasting Notes</div>
              <div class="iq-summary-card">
                <div class="iq-summary-text muted">${escapeHtml(state.notes || "No tasting notes added.")}</div>
              </div>
            </div>

            <div class="iq-summary-block">
              <div class="iq-summary-actions">
                <button class="iq-save-btn" type="button" data-nav="edit">Edit Rating</button>
                <button class="iq-edit-btn" type="button" id="editBottleBtn">Edit Details</button>
              </div>
            </div>

            <div class="iq-summary-block">
              <button class="iq-delete-btn" type="button" id="deleteAllBtn">Delete Bourbon</button>
            </div>
          </div>
        </section>
      `;
    }

    function renderStages() {
      let html = "";
      categories.forEach((cat, index) => {
        html += cat.type === "range"
          ? renderRangeStage(cat, index)
          : renderChoiceStage(cat, index);
      });
      html += renderSummaryStage();
      stagesEl.innerHTML = html;
    }

    function setupHoldButton(btn, direction, key) {
      let timer = null;
      let interval = null;

      const run = () => {
        const cat = categories.find(c => c.key === key);
        if (!cat) return;
        const delta = direction === "up" ? 1 : -1;
        state.scores[key] = clamp(Number(state.scores[key]) + delta, 0, cat.max);
        render();
      };

      const start = (e) => {
        e.preventDefault();
        run();
        timer = setTimeout(() => {
          interval = setInterval(run, 45);
        }, 180);
      };

      const stop = () => {
        clearTimeout(timer);
        clearInterval(interval);
        timer = null;
        interval = null;
      };

      btn.addEventListener("mousedown", start);
      btn.addEventListener("touchstart", start, { passive: false });
      btn.addEventListener("mouseup", stop);
      btn.addEventListener("mouseleave", stop);
      btn.addEventListener("touchend", stop);
      btn.addEventListener("touchcancel", stop);
    }

    function attachEvents() {
      const notesInput = document.getElementById("notesInput");
      if (notesInput) {
        notesInput.addEventListener("input", (e) => {
          state.notes = e.target.value;
        });
      }

      document.querySelectorAll("[data-tag]").forEach(btn => {
        btn.addEventListener("click", () => {
          const tag = btn.dataset.tag;
          if (state.tags.includes(tag)) {
            state.tags = state.tags.filter(t => t !== tag);
          } else {
            state.tags.push(tag);
          }
          render();
        });
      });

      document.querySelectorAll("[data-step='down']").forEach(btn => {
        setupHoldButton(btn, "down", btn.dataset.key);
      });

      document.querySelectorAll("[data-step='up']").forEach(btn => {
        setupHoldButton(btn, "up", btn.dataset.key);
      });

      document.querySelectorAll("[data-range-key]").forEach(input => {
        input.addEventListener("input", () => {
          const key = input.dataset.rangeKey;
          state.scores[key] = Number(input.value);
          render();
        });
      });

      document.querySelectorAll("[data-input-key]").forEach(input => {
        input.addEventListener("input", () => {
          const key = input.dataset.inputKey;
          const cat = categories.find(c => c.key === key);
          const val = Number(input.value || 0);
          state.scores[key] = clamp(isNaN(val) ? 0 : val, 0, cat.max);
          render();
        });
      });

      document.querySelectorAll("[data-choice-key]").forEach(btn => {
        btn.addEventListener("click", () => {
          const key = btn.dataset.choiceKey;
          const value = Number(btn.dataset.choiceValue);
          state.scores[key] = value;
          render();
        });
      });

      document.querySelectorAll("[data-nav='summary']").forEach(btn => {
        btn.addEventListener("click", () => {
          state.activeStage = categories.length;
          render();
        });
      });

      document.querySelectorAll("[data-nav='edit']").forEach(btn => {
        btn.addEventListener("click", () => {
          state.activeStage = 0;
          render();
        });
      });

      document.querySelectorAll("[data-status]").forEach(btn => {
        btn.addEventListener("click", () => {
          const key = btn.dataset.status;
          state.statuses[key] = !state.statuses[key];
          render();
        });
      });

      const editBottleBtn = document.getElementById("editBottleBtn");
      if (editBottleBtn) {
        editBottleBtn.addEventListener("click", () => {
          const nextName = prompt("Bottle name:", state.bottleName);
          if (nextName !== null) {
            state.bottleName = nextName.trim() || "Your Bottle Name";
            render();
          }
        });
      }

      const deleteAllBtn = document.getElementById("deleteAllBtn");
      if (deleteAllBtn) {
        deleteAllBtn.addEventListener("click", () => {
          const ok = confirm("Delete all Whiskey IQ scores and notes?");
          if (!ok) return;

          state.notes = "";
          state.tags = [];
          state.activeStage = 0;
          state.statuses = {
            wantToTry: false,
            onShelf: false,
            finished: false
          };
          state.scores = {
            aroma: 0,
            flavor: 0,
            finish: 0,
            drinkAgain: 0,
            recommend: 0,
            value: 0
          };
          render();
        });
      }

      const shareBtn = document.getElementById("shareBtn");
      if (shareBtn) {
        shareBtn.addEventListener("click", async () => {
          const text = `${state.bottleName} — Whiskey IQ Score: ${totalScore()}/100`;
          if (navigator.share) {
            try {
              await navigator.share({ title: "Whiskey IQ", text });
            } catch (e) {}
          } else {
            try {
              await navigator.clipboard.writeText(text);
              alert("Score copied to clipboard");
            } catch (e) {
              alert(text);
            }
          }
        });
      }
    }

    function render() {
      applyTheme();
      bottleTitleDisplay.textContent = state.bottleName || "Your Bottle Name";
      renderSidebar();
      renderStages();
      attachEvents();
    }

    themeToggle.addEventListener("click", () => {
      state.theme = state.theme === "light" ? "dark" : "light";
      applyTheme();
      render();
    });

    render();
  </script>
</body>
</html>
